name: studydesk
description: "Offline-first study toolkit for quizzes, flashcards, sheets, and Q&A practice."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  flutter_markdown_plus: ^1.0.7
  flutter_markdown_plus_latex: ^1.0.5
  flutter_math_fork: ^0.7.4
  flutter_dropzone: ^4.2.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.3.1
  markdown: ^7.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_data/
